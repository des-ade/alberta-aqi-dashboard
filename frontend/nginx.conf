# Define rate limit zones
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=ingestion:10m rate=2r/m;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend — rate limited
    location /api/ {
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Ingestion endpoints — heavily rate limited
    location /api/ingestion/ {
        limit_req zone=ingestion burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy Swagger UI
    location /swagger {
        limit_req zone=general burst=10 nodelay;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy Hangfire dashboard
    location /internal-jobs-dashboard {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve React app — all other routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}