version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: alberta_aqi_db
    environment:
      POSTGRES_DB: alberta_aqi
      POSTGRES_USER: aqi_user
      POSTGRES_PASSWORD: aqi_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: